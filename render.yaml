services:
  - type: web
    name: medminder-backend
    runtime: java
    rootDir: backend
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/medminder-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_INIT_MODE
        value: never
      - key: FRONTEND_ORIGIN
        sync: false
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: medminder-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: medminder-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: medminder-db
          property: password

  - type: web
    name: medminder-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ENABLE_MOCK_FALLBACK
        value: "false"

databases:
  - name: medminder-db
    databaseName: medminder
    user: medminder_user
    plan: free
