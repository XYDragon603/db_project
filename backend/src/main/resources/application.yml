spring:
  application:
    name: medminder
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medminder}}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${DB_USER:}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${DB_PASS:}}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  sql:
    init:
      mode: ${DB_INIT_MODE:never}
      schema-locations:
        - optional:file:../database/schema.sql
        - optional:file:../database/indexes.sql
      data-locations:
        - optional:file:../database/seed.sql

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: ${PORT:8080}
